<section class="password-screen">
  <div class="password-overlay"></div>

  <div class="password-shell">
    <div class="password-intro">
      <p class="hero-eyebrow">For my Madame Annah Claire</p>
      <h1 class="hero-title">
        <span class="title-line">Before the</span>
        <span class="title-line italic-line">verses bloom</span>
      </h1>
      <div class="hero-divider">
        <span class="divider-ornament">❧</span>
      </div>
      <p class="hero-subtitle">
        A single password opens the entire site. Until then, the pages stay hidden.
      </p>
    </div>

    <form class="password-panel" (submit)="$event.preventDefault(); submit()">
      <div class="panel-glow"></div>

      <div class="panel-header">
        <span class="panel-kicker">Access Key</span>
        <p class="panel-copy">
          Enter the password to reveal the letters, poems, and details behind this page.
        </p>
      </div>

      <label class="field-label" for="site-password">Password</label>
      <input
        id="site-password"
        class="password-input"
        type="password"
        autocomplete="off"
        [formControl]="passwordControl"
        [placeholder]="hasCheckedUnlockTime() ? 'Password required' : 'Checking access window...'"
        (input)="clearError()"
      />

      @if (errorMessage()) {
        <p class="error-message">{{ errorMessage() }}</p>
      }

      <button class="submit-button" type="submit">
        <span>Continue</span>
        <span class="submit-arrow">→</span>
      </button>
    </form>
  </div>
</section>
